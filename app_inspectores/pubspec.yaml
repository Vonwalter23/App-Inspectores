name: app_inspectores
description: Sistema Integral para Inspectores de Tránsito de Trelew
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  firebase_messaging: ^14.7.10
  firebase_storage: ^11.6.0
  
  # Google Sign In
  google_sign_in: ^6.2.1
  
  # Geolocalización
  geolocator: ^12.0.0
  permission_handler: ^11.0.0
  
  # HTTP y APIs
  http: ^1.2.0
  
  # Audio Recording
  record: ^5.0.5
  audioplayers: ^5.2.1
  
  # Utils
  intl: ^0.18.1
  shared_preferences: ^2.2.2
  connectivity_plus: ^5.0.2
  
  # UI
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

dependency_overrides:
  record_linux: ^1.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/icons/
    - assets/images/
