name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Tipo de Build'
        required: true
        default: 'release'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Copy google-services.json
        run: |
          echo "$GOOGLE_SERVICES_JSON" > google-services.json
          echo "$GOOGLE_SERVICES_JSON" > android/app/google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ vars.GOOGLE_SERVICES_JSON }}

      - name: Generate Keystore
        run: |
          cd android/app
          keytool -genkeypair -v -storetype PKCS12 \
            -keystore inspectores.jks \
            -alias inspectores \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass ${{ secrets.KEYSTORE_PASSWORD }} \
            -keypass ${{ secrets.KEYSTORE_PASSWORD }} \
            -dname "CN=App Inspectores Trelew, OU=Municipalidad, O=Municipalidad de Trelew, L=Trelew, ST=Chubut, C=AR"

      - name: Prebuild Expo
        run: npx expo prebuild --platform android --clean

      - name: Copy google-services.json after prebuild
        run: |
          echo "$GOOGLE_SERVICES_JSON" > android/app/google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ vars.GOOGLE_SERVICES_JSON }}

      - name: Update build.gradle with signing config
        run: |
          # Agregar signing config al build.gradle
          cat >> android/app/build.gradle << 'EOF'

          // Firma para release
          android {
              signingConfigs {
                  release {
                      storeFile file('inspectores.jks')
                      storePassword '${{ secrets.KEYSTORE_PASSWORD }}'
                      keyAlias 'inspectores'
                      keyPassword '${{ secrets.KEYSTORE_PASSWORD }}'
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                  }
              }
          }
          EOF

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assemble${{ inputs.build_type }} --no-daemon -x lint

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ inputs.build_type }}-apk
          path: android/app/build/outputs/apk/${{ inputs.build_type }}/app-*.apk
          retention-days: 7

      - name: Upload Keystore
        uses: actions/upload-artifact@v4
        with:
          name: keystore
          path: android/app/inspectores.jks
          retention-days: 30
        if: inputs.build_type == 'release'
